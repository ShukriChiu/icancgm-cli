name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: sino-linux-x64
            exe_suffix: ""
            use_zigbuild: false
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: sino-linux-arm64
            exe_suffix: ""
            use_zigbuild: true
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: sino-darwin-arm64
            exe_suffix: ""
            use_zigbuild: false
          - runner: macos-14
            target: x86_64-apple-darwin
            asset_name: sino-darwin-x64
            exe_suffix: ""
            use_zigbuild: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sino-win32-x64.exe
            exe_suffix: ".exe"
            use_zigbuild: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set up Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release -p sino-cli --target "${{ matrix.target }}"
          else
            cargo build --release -p sino-cli --target "${{ matrix.target }}"
          fi

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp "target/${{ matrix.target }}/release/sino${{ matrix.exe_suffix }}" "release-assets/${{ matrix.asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release-assets/${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  publish-npm:
    name: Publish npm Package
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Verify release readiness
        run: npm run release:check -- ${{ github.ref_name }}

      - name: Build npm wrapper
        run: npm run build -w @shukrichiu/icancgm-cli

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @shukrichiu/icancgm-cli --access public --provenance
